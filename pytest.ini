[pytest]
# 只收集我们新写的测试文件，避免旧脚本和调试工具被误扫
testpaths = tests
python_files = test_auth_routes.py test_analysis_routes.py test_real_analysis_routes.py test_cloudbase_client.py test_health_routes.py test_reports_routes.py test_security_permissions.py test_runtime_config.py test_main_app_routes.py
python_classes = Test*
python_functions = test_*

# 默认跳过 integration 标记的测试（可通过 -m integration 运行）
addopts = -m "not integration"

# 标记定义，避免警告
markers =
    integration: 标记集成/端到端测试（默认跳过）

asyncio_mode = auto
